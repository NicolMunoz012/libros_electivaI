<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Libros{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4f8ef7;
            --primary-light: #e8f0fe;
            --accent: #38c9a0;
            --accent-light: #e6f9f4;
            --danger-light: #fdecea;
            --warning-light: #fff8e1;
            --bg: #f4f7fb;
            --card-shadow: 0 2px 16px rgba(79,142,247,0.10);
        }
        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #2d3748;
        }
        .navbar {
            background: linear-gradient(90deg, #4f8ef7 0%, #38c9a0 100%) !important;
            box-shadow: 0 2px 12px rgba(79,142,247,0.18);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
        }
        .nav-link {
            font-weight: 500;
            opacity: 0.92;
            transition: opacity 0.2s;
        }
        .nav-link:hover { opacity: 1; }
        .page-header {
            background: linear-gradient(135deg, var(--primary-light) 0%, var(--accent-light) 100%);
            border-radius: 14px;
            padding: 1.5rem 2rem;
            margin-bottom: 1.75rem;
            border-left: 5px solid var(--primary);
        }
        .page-header h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: #2d3748;
            margin: 0;
        }
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: var(--card-shadow);
        }
        .table thead th {
            background: linear-gradient(90deg, var(--primary-light), var(--accent-light));
            color: #2d3748;
            font-weight: 600;
            border: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .table tbody tr {
            transition: background 0.15s;
        }
        .table tbody tr:hover {
            background-color: var(--primary-light);
        }
        .table td, .table th {
            vertical-align: middle;
            border-color: #edf2f7;
        }
        .btn-primary {
            background: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background: #3a7ae0;
            border-color: #3a7ae0;
        }
        .btn-success {
            background: var(--accent);
            border-color: var(--accent);
        }
        .btn-success:hover {
            background: #2aab87;
            border-color: #2aab87;
        }
        .btn-warning {
            background: #f6c343;
            border-color: #f6c343;
            color: #2d3748;
        }
        .btn-warning:hover {
            background: #e0ad2a;
            border-color: #e0ad2a;
            color: #2d3748;
        }
        .btn { border-radius: 8px; font-weight: 500; }
        .badge-genero {
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        footer {
            background: linear-gradient(90deg, #4f8ef7 0%, #38c9a0 100%);
            color: #fff;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'inicio' %}">📚 Gestión de Libros</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'inicio' %}"><i class="bi bi-house-door me-1"></i>Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'autor_list' %}"><i class="bi bi-people me-1"></i>Autores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'libro_list' %}"><i class="bi bi-book me-1"></i>Libros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/admin/"><i class="bi bi-shield-lock me-1"></i>Admin</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <footer class="py-3 mt-4">
        <div class="container text-center">
            <small>&copy; 2024 Sistema de Gestión de Libros &mdash; Taller Django</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
