{% extends 'gestion/base.html' %}

{% block title %}Crear Autor{% endblock %}

{% block content %}
    <h1 class="mb-4">Crear Nuevo Autor</h1>
    <form method="post" class="card p-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success mt-3">Guardar Autor</button>
        <a href="{% url 'autor_list' %}" class="btn btn-secondary mt-2">Cancelar</a>
    </form>
{% endblock %}
