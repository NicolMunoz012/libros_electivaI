databases:
  - name: libros-db
    plan: free
    databaseName: libros_db
    user: libros_user

services:
  - type: web
    plan: free
    name: sistema-gestion-libros
    runtime: python
    buildCommand: './build.sh'
    startCommand: 'gunicorn proyecto.wsgi:application --bind 0.0.0.0:$PORT'
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: libros-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: False
      - key: WEB_CONCURRENCY
        value: 4
      - key: PYTHON_VERSION
        value: 3.11.0